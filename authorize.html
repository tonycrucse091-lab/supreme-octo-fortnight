<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Transfer - Demo Only</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-banner">DEMO ONLY - NOT A REAL TRANSFER SERVICE</div>

    <main class="container">
        <header>
            <a href="index.html" class="back-link">&larr; Back to Home</a>
            <h1>Authorize Transfer</h1>
            <div class="demo-badge">Demo Only</div>
        </header>

        <section class="form-section">
            <div class="card">
                <form id="transferForm">
                    <div class="form-group">
                        <label for="senderName">Your Name (Demo Only)</label>
                        <input type="text" id="senderName" name="senderName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount (Demo Only)</label>
                        <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="recipient">Recipient (Demo Only)</label>
                        <input type="text" id="recipient" name="recipient" placeholder="Recipient Name or Account" required>
                    </div>

                    <div class="form-group">
                        <label for="reason">Reason (Demo Only)</label>
                        <textarea id="reason" name="reason" rows="3" placeholder="Purpose of transfer" required></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="button primary">Submit Authorization</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="container">
        <p>&copy; 2026 Transfer Demo (Demo Only). All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
