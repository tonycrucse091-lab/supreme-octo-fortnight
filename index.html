<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccountFlow - Transfer Scenario</title>
    <!-- React and ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0F172A',
                        card: '#111827',
                        border: '#1F2937',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0F172A; }
        .progress-scroll::-webkit-scrollbar { height: 4px; }
        .progress-scroll::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const InfoBanner = () => (
            <div className="bg-indigo-900/30 border border-indigo-500/20 rounded-xl p-4 mb-6">
                <p className="text-indigo-200 text-sm flex items-center gap-2">
                    <span className="text-lg">⚠️</span>
                    This is a simulated scenario for informational purposes only. No real banking transaction is being processed.
                </p>
            </div>
        );

        const Card = ({ title, children, className = "" }) => (
            <div className={`bg-card border border-border rounded-2xl p-6 shadow-xl transition-all hover:shadow-2xl hover:border-border/60 ${className}`}>
                {title && <h2 className="text-gray-100 text-lg font-semibold mb-6">{title}</h2>}
                {children}
            </div>
        );

        const AccountDetailItem = ({ label, value, badge }) => (
            <div className="flex flex-col gap-1">
                <span className="text-gray-500 text-xs font-medium uppercase tracking-wider">{label}</span>
                <div className="flex items-center gap-3">
                    <span className="text-gray-200 font-medium">{value}</span>
                    {badge && (
                        <span className="px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-yellow-500/10 text-yellow-500 border border-yellow-500/20">
                            {badge}
                        </span>
                    )}
                </div>
            </div>
        );

        const ProgressStep = ({ step, index, currentStep }) => {
            const isCompleted = index < currentStep;
            const isCurrent = index === currentStep;
            
            return (
                <div className="flex flex-col items-center gap-3 min-w-[120px] relative group">
                    {/* Connector Line */}
                    {index < 4 && (
                        <div className={`absolute top-4 left-[50%] w-full h-[2px] ${isCompleted ? 'bg-cyan-500' : 'bg-gray-800'}`} />
                    )}
                    
                    {/* Step Icon/Circle */}
                    <div className={`w-8 h-8 rounded-full flex items-center justify-center z-10 transition-all duration-300 ${
                        isCompleted ? 'bg-cyan-500 text-primary' : 
                        isCurrent ? 'bg-indigo-600 text-white shadow-[0_0_15px_rgba(79,70,229,0.5)]' : 
                        'bg-gray-800 text-gray-500'
                    }`}>
                        {isCompleted ? (
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" />
                            </svg>
                        ) : (
                            <span className="text-sm font-bold">{index + 1}</span>
                        )}
                    </div>
                    
                    <span className={`text-[11px] font-semibold text-center whitespace-nowrap transition-colors ${
                        isCurrent ? 'text-indigo-400' : 
                        isCompleted ? 'text-cyan-500' : 'text-gray-500'
                    }`}>
                        {step} {isCurrent && '⏳'}
                    </span>
                </div>
            );
        };

        const TransferScenarioSection = () => {
            const steps = [
                "Application Submitted",
                "Under Review",
                "Account Created",
                "Transfer Pending",
                "Transfer Completed"
            ];
            
            const [currentStep, setCurrentStep] = useState(2); // Set to "Account Created" as current step

            return (
                <div className="max-w-[1100px] mx-auto px-4 py-12 md:px-8 space-y-7">
                    {/* Header Section */}
                    <header className="space-y-2">
                        <h1 className="text-3xl md:text-4xl font-bold text-gray-100 tracking-tight">
                            Account Setup & Transfer Overview
                        </h1>
                        <p className="text-gray-400 text-base md:text-lg">
                            Track the progress of account activation and associated transfer timeline
                        </p>
                    </header>

                    <InfoBanner />

                    {/* Account Info Card */}
                    <Card title="Account Details">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <AccountDetailItem 
                                label="Bank Name" 
                                value="Deutsche Kreditbank AG" 
                            />
                            <AccountDetailItem 
                                label="Account Status" 
                                value="Pending Activation" 
                                badge="PENDING ACTIVATION"
                            />
                            <AccountDetailItem 
                                label="Estimated Activation Time" 
                                value="24–72 hours after verification" 
                            />
                        </div>
                    </Card>

                    {/* Transfer Status Card */}
                    <Card title="Transfer Status">
                        <div className="space-y-10">
                            {/* Transfer Top Details */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 p-5 bg-gray-900/50 rounded-xl border border-border/50">
                                <div className="space-y-1">
                                    <span className="text-gray-500 text-xs font-bold uppercase">Amount</span>
                                    <p className="text-2xl font-bold text-cyan-400">$270,000</p>
                                </div>
                                <div className="space-y-1">
                                    <span className="text-gray-500 text-xs font-bold uppercase">Recipient</span>
                                    <p className="text-xl font-semibold text-gray-100">Sandra Brunner</p>
                                </div>
                                <div className="space-y-1">
                                    <span className="text-gray-500 text-xs font-bold uppercase">Transfer Status</span>
                                    <p className="text-sm font-medium text-indigo-400 flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse" />
                                        Awaiting Account Activation
                                    </p>
                                </div>
                            </div>

                            {/* Progress Tracker */}
                            <div className="overflow-x-auto progress-scroll pb-4">
                                <div className="flex justify-between items-start min-w-[700px] px-2">
                                    {steps.map((step, index) => (
                                        <ProgressStep 
                                            key={index} 
                                            step={step} 
                                            index={index} 
                                            currentStep={currentStep} 
                                        />
                                    ))}
                                </div>
                            </div>

                            {/* Status Message Box */}
                            <div className="bg-gray-800/30 rounded-xl p-5 border border-border/40">
                                <p className="text-gray-400 text-sm leading-relaxed">
                                    The transfer will be initiated once the account is fully activated and verified. 
                                    Processing timelines may vary depending on internal review procedures.
                                </p>
                            </div>

                            {/* Footer Disclaimer */}
                            <p className="text-center text-gray-600 text-[10px] font-medium tracking-wide uppercase">
                                This is a demo scenario. No real funds are being transferred.
                            </p>
                        </div>
                    </Card>
                </div>
            );
        };

        const App = () => (
            <div className="min-h-screen">
                <TransferScenarioSection />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
