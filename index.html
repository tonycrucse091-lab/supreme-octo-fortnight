<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccountFlow Kurzbericht</title>
    <!-- React and ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        background: '#0F172A',
                        card: '#111827',
                        border: '#1F2937',
                        textPrimary: '#E5E7EB',
                        textSecondary: '#9CA3AF',
                        accent: '#4F46E5',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0F172A; color: #E5E7EB; }
        .document-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SectionCard = ({ title, children, className = "" }) => (
            <div className={`bg-card border border-border rounded-2xl p-6 md:p-8 mb-6 ${className}`}>
                {title && <h2 className="text-accent text-sm font-bold uppercase tracking-wider mb-6">{title}</h2>}
                {children}
            </div>
        );

        const InfoRow = ({ label, value, highlight = false }) => (
            <div className="flex flex-col md:flex-row md:justify-between md:items-center py-3 border-b border-border/50 last:border-0">
                <span className="text-textSecondary text-sm mb-1 md:mb-0">{label}</span>
                <span className={`text-sm font-semibold ${highlight ? 'text-indigo-400' : 'text-textPrimary'}`}>{value}</span>
            </div>
        );

        const TimelineStep = ({ step, title, desc, isLast = false }) => (
            <div className="flex gap-4">
                <div className="flex flex-col items-center">
                    <div className="w-8 h-8 rounded-full border-2 border-accent flex items-center justify-center text-xs font-bold text-accent bg-background">
                        {step}
                    </div>
                    {!isLast && <div className="w-[2px] h-full bg-border my-1" />}
                </div>
                <div className="pb-8">
                    <h3 className="text-textPrimary text-sm font-bold mb-1">{title}</h3>
                    <p className="text-textSecondary text-xs leading-relaxed">{desc}</p>
                </div>
            </div>
        );

        const AccountFlowBrief = () => {
            return (
                <div className="max-w-[900px] mx-auto px-6 py-12 md:py-20 fade-in">
                    {/* Header */}
                    <header className="text-center mb-16">
                        <h1 className="text-4xl md:text-5xl font-bold text-textPrimary tracking-tight mb-3">AccountFlow Kurzbericht</h1>
                        <p className="text-textSecondary text-lg">Informationen zur Kontoeröffnung und Überweisung</p>
                        <div className="w-20 h-1 bg-accent mx-auto mt-8 rounded-full"></div>
                    </header>

                    {/* Source Section */}
                    <SectionCard className="bg-accent/5 border-accent/20">
                        <div className="flex items-start gap-4">
                            <div className="p-2 bg-accent/10 rounded-lg text-accent">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <div>
                                <h2 className="text-textPrimary text-base font-bold mb-2">Informationsquelle</h2>
                                <p className="text-textSecondary text-sm mb-4 leading-relaxed italic">
                                    "Diese Informationen wurden von einem Bank-Kundenbetreuer zu Informationszwecken bereitgestellt."
                                </p>
                                <div className="pt-4 border-t border-accent/10">
                                    <p className="text-textSecondary text-xs uppercase font-bold tracking-widest mb-1">Name der Quelle</p>
                                    <p className="text-textPrimary text-lg font-medium">Herr Peter Henkel</p>
                                </div>
                            </div>
                        </div>
                    </SectionCard>

                    {/* Account Information */}
                    <SectionCard title="Details zur Kontoeröffnung">
                        <div className="space-y-1">
                            <InfoRow label="Bankname" value="Deutsche Kreditbank AG" />
                            <InfoRow label="Kontotyp" value="Privatkonto" />
                            <InfoRow label="Status" value="Aktivierung ausstehend" highlight />
                            <div className="mt-6 pt-4 border-t border-border/30">
                                <p className="text-textSecondary text-xs leading-relaxed flex items-start gap-2">
                                    <span className="text-accent">•</span>
                                    Die Kontoaktivierung unterliegt den standardmäßigen Verifizierungsverfahren.
                                </p>
                            </div>
                        </div>
                    </SectionCard>

                    {/* Transfer Information */}
                    <SectionCard title="Überweisungsdetails">
                        <div className="space-y-1">
                            <InfoRow label="Betrag" value="$270.000" highlight />
                            <InfoRow label="Empfänger" value="Sandra Brunner" />
                            <InfoRow label="Status" value="Wartet auf Kontoaktivierung" />
                            <div className="mt-6 pt-4 border-t border-border/30">
                                <p className="text-textSecondary text-xs leading-relaxed flex items-start gap-2">
                                    <span className="text-accent">•</span>
                                    Die Überweisung wird voraussichtlich nach erfolgreicher Kontoaktivierung durchgeführt.
                                </p>
                            </div>
                        </div>
                    </SectionCard>

                    {/* Process Timeline */}
                    <SectionCard title="Prozess-Zeitplan">
                        <div className="mt-4">
                            <TimelineStep 
                                step="1" 
                                title="Antrag eingereicht" 
                                desc="Die erste Anweisung zur Kontoeröffnung und Überweisungsabsicht wurde registriert." 
                            />
                            <TimelineStep 
                                step="2" 
                                title="In Prüfung" 
                                desc="Die Dokumentation wird derzeit auf interne Compliance-Standards geprüft." 
                            />
                            <TimelineStep 
                                step="3" 
                                title="Konto erstellt" 
                                desc="Die technische Einrichtung des Begünstigtenkontos ist abgeschlossen und wartet auf die finale Aktivierung." 
                            />
                            <TimelineStep 
                                step="4" 
                                title="Überweisung eingeleitet" 
                                desc="Automatischer Überweisungsauslöser, sobald das Konto den Status 'vollständig aktiv' erreicht." 
                            />
                            <TimelineStep 
                                step="5" 
                                title="Abgeschlossen" 
                                desc="Endgültige Abrechnung der Gelder auf das aktivierte Privatkonto." 
                                isLast 
                            />
                        </div>
                    </SectionCard>

                    {/* Summary Note */}
                    <div className="text-center px-6 py-8 border-t border-border/50">
                        <p className="text-textSecondary text-sm leading-relaxed max-w-xl mx-auto">
                            Diese Seite enthält strukturierte Informationen zum Prozess der Kontoeinrichtung und zum zugehörigen Zeitplan der Überweisung.
                        </p>
                    </div>

                    {/* Footer */}
                    <footer className="text-center mt-12">
                        <p className="text-textSecondary text-xs font-bold uppercase tracking-widest">AccountFlow Kurzbericht</p>
                        <p className="text-textSecondary/40 text-[10px] mt-2">© 2026 Informatives Dokumentations-Szenario</p>
                    </footer>
                </div>
            );
        };

        const App = () => (
            <div className="min-h-screen">
                <AccountFlowBrief />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
